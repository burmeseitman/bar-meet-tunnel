version: '3.8'

services:
  gateway:
    build: 
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "80:80"
      - "9000:9000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis:6379

  redis:
    image: redis:alpine
    container_name: bar-meet-redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: bar-meet-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - gateway
